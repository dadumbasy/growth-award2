// ── Firebase CRUD ─────────────────────────────────────────────
function dbRef(cid){ return ref(db, `classes/${cid}/submissions`); }

async function saveSub(cid, data){
  try {
    await push(dbRef(cid), { ...data, at: new Date().toLocaleString("ko-KR") });
    return true;
  } catch(e){ console.error(e); return false; }
}

function listenSubs(cid, callback){
  onValue(dbRef(cid), snap => {
    const val = snap.val();
    const list = val ? Object.entries(val).map(([k,v])=>({_key:k,...v})) : [];
    callback(list);
  });
}

async function getSubs(cid){
  const snap = await get(dbRef(cid));
  const val = snap.val();
  return val ? Object.entries(val).map(([k,v])=>({_key:k,...v})) : [];
}

async function resetSubs(cid){
  await remove(dbRef(cid));
}

// ── 엑셀 ─────────────────────────────────────────────────────
function downloadXLSX(cid, subs){
  const cfg=CLASS_CONFIG[cid];
  const wb=XLSX.utils.book_new();
  const byName=[["작성자","제출시간","분야","추천 친구","추천 이유"]];
  subs.forEach(s=>FIELDS.forEach(f=>{ const d=s.fields?.[f.id]; if(d&&(d.who||d.why)) byName.push([s.name,s.at,f.title,d.who||"",d.why||""]); }));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(byName),"이름별");
  FIELDS.forEach(f=>{ const rows=[["추천받은 친구","추천한 학생","추천 이유"]]; subs.forEach(s=>{ const d=s.fields?.[f.id]; if(d&&(d.who||d.why)) rows.push([d.who||"",s.name,d.why||""]); }); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),f.title); });
  const tally=Object.fromEntries(FIELDS.map(f=>[f.id,{}]));
  subs.forEach(s=>FIELDS.forEach(f=>{ const n=s.fields?.[f.id]?.who?.trim(); if(n) tally[f.id][n]=(tally[f.id][n]||0)+1; }));
  const total={};
  FIELDS.forEach(f=>Object.entries(tally[f.id]).forEach(([n,c])=>{ total[n]=(total[n]||0)+c; }));
  const stat=[["순위","이름","총합",...FIELDS.map(f=>f.title)]];
  Object.entries(total).sort((a,b)=>b[1]-a[1]).forEach(([n,t],i)=>stat.push([i+1,n,t,...FIELDS.map(f=>tally[f.id][n]||0)]));
  stat.push([]); stat.push(["제출현황",`${subs.length}명 / ${cfg.students.length}명`]);
  const notSub=cfg.students.filter(s=>!subs.find(sub=>sub.name===s));
  if(notSub.length) stat.push(["미제출",notSub.join(", ")]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(stat),"통계");
  XLSX.writeFile(wb,`${cfg.label}_성장상.xlsx`);
}

// ── DOM 헬퍼 ─────────────────────────────────────────────────
function el(tag, attrs, children){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  (children||[]).forEach(c=>{ if(c==null) return; e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
}

function showToast(msg){
  const t=document.createElement("div");
  Object.assign(t.style,{position:"fixed",bottom:"32px",left:"50%",transform:"translateX(-50%) translateY(10px)",opacity:"0",transition:"all 0.3s",zIndex:"999",background:"#09090B",color:"#fff",padding:"14px 28px",borderRadius:"999px",fontSize:"14px",fontWeight:"600",whiteSpace:"nowrap",boxShadow:"0 8px 32px rgba(0,0,0,0.22)"});
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity="1";t.style.transform="translateX(-50%) translateY(0)";},10);
  setTimeout(()=>{t.style.opacity="0";setTimeout(()=>t.remove(),300);},2600);
}

function showAlert(msg){
  const ov=el("div",{style:{position:"fixed",inset:"0",zIndex:"999",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",background:"rgba(0,0,0,0.3)",backdropFilter:"blur(4px)"}});

  box.appendChild(el("p",{style:{fontSize:"15px",color:"#3F3F46",lineHeight:"1.6",marginBottom:"24px",whiteSpace:"pre-line"}},[msg]));

}

  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") tryLogin(); });

  if(s.pwErr) inner.appendChild(el("p",{style:{fontSize:"12px",color:"#EF4444",marginBottom:"4px"}},["비밀번호가 올바르지 않습니다."]));

function tryLogin(){
  if(state.pw===CLASS_CONFIG[state.classId].password){
    state.pwErr=false;
    // Firebase에서 실시간 구독
    listenSubs(state.classId, subs=>{ state.adminSubs=subs; if(state.screen==="admin") render(); });
    setState({screen:"admin",adminTab:"stats",adminSel:null,adminSubs:[]});
  } else {
    setState({pwErr:true});
  }
}

  const defO=document.createElement("option"); defO.value=""; defO.textContent="이름을 선택하세요"; nameSel.appendChild(defO);
  cfg.students.forEach(st=>{ const o=document.createElement("option"); o.value=st; o.textContent=st; if(st===s.name) o.selected=true; nameSel.appendChild(o); });
  wBody.appendChild(nameSel);
  if(!s.confirmed){
    const cb=el("button",{style:{width:"100%",padding:"14px",background:"#09090B",color:"#fff",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"15px",cursor:"pointer"},onClick:()=>{ if(!state.name){showAlert("작성자 이름을 선택해 주세요.");return;} state.confirmed=true; render(); }},["확인"]);
    cb.addEventListener("mouseenter",e=>e.target.style.background="#27272A");
    cb.addEventListener("mouseleave",e=>e.target.style.background="#09090B");
    wBody.appendChild(cb);
  } else {
    const row=el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#F4F4F5",borderRadius:"10px"}});
    row.appendChild(el("span",{style:{fontSize:"14px",color:"#09090B",fontWeight:"600"}},[`${s.name} 학생으로 작성 중`]));
    row.appendChild(el("button",{style:{background:"none",border:"none",cursor:"pointer",fontSize:"12px",color:"#A1A1AA",textDecoration:"underline"},onClick:()=>{ state.confirmed=false; state.fields=emptyF(); render(); }},["변경"]));
    wBody.appendChild(row);
  }
  writerCard.appendChild(wBody); body.appendChild(writerCard);

  if(s.confirmed){
    FIELDS.forEach(f=>{
      const d=s.fields[f.id]||{who:"",why:""};
      const card=el("div",{style:{background:"#fff",borderRadius:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.05)",overflow:"hidden",marginBottom:"12px"}});
      const ch=el("div",{style:{background:`linear-gradient(135deg,${f.accent}22,${f.accent}0A)`,borderBottom:`2px solid ${f.accent}33`,padding:"18px 20px"}});
      const cht=el("div",{style:{display:"flex",alignItems:"baseline",gap:"10px",marginBottom:"4px"}});
      cht.appendChild(el("span",{style:{fontSize:"11px",fontWeight:"800",color:f.accent,letterSpacing:"0.12em"}},[f.num]));
      cht.appendChild(el("span",{style:{fontSize:"18px",fontWeight:"800",color:"#09090B",letterSpacing:"-0.02em"}},[f.title]));
      ch.appendChild(cht);
      ch.appendChild(el("p",{style:{fontSize:"12px",color:"#71717A",lineHeight:"1.5"}},[f.sub]));
      card.appendChild(ch);
      const cb2=el("div",{style:{padding:"18px 20px 20px",display:"flex",flexDirection:"column",gap:"16px"}});
      // 친구 선택
      const ww=el("div");
      ww.appendChild(el("label",{style:{display:"block",fontSize:"11px",fontWeight:"700",color:"#A1A1AA",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"8px"}},["추천 친구"]));
      const ws=document.createElement("select");
      Object.assign(ws.style,{width:"100%",border:"none",borderBottom:`2px solid #E4E4E7`,background:"transparent",padding:"8px 0",fontSize:"16px",color:d.who?"#09090B":"#A1A1AA",outline:"none",appearance:"none",transition:"border-color 0.2s",cursor:"pointer",boxSizing:"border-box"});
      ws.addEventListener("focus",e=>e.target.style.borderBottomColor=f.accent);
      ws.addEventListener("blur",e=>e.target.style.borderBottomColor="#E4E4E7");
      ws.addEventListener("change",e=>{ state.fields[f.id].who=e.target.value; });
      const wo=document.createElement("option"); wo.value=""; wo.textContent="선택 안 함"; ws.appendChild(wo);
      nominees.forEach(n=>{ const o=document.createElement("option"); o.value=n; o.textContent=n; if(n===d.who) o.selected=true; ws.appendChild(o); });
      ww.appendChild(ws); cb2.appendChild(ww);
      // 이유
      const yw=el("div");
      const yt=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
      yt.appendChild(el("label",{style:{fontSize:"11px",fontWeight:"700",color:"#A1A1AA",letterSpacing:"0.08em",textTransform:"uppercase"}},["내가 이 친구를 추천하는 이유"]));
      const cs=el("span",{style:{fontSize:"10px",color:"#A1A1AA"}},[d.why.length>0?`${d.why.length}/${MAX}`:""]);
      yt.appendChild(cs); yw.appendChild(yt);
      const ta=document.createElement("textarea");
      Object.assign(ta.style,{width:"100%",border:"none",borderBottom:`2px solid #E4E4E7`,background:"transparent",padding:"8px 0",fontSize:"14px",color:"#09090B",outline:"none",resize:"none",lineHeight:"1.6",transition:"border-color 0.2s",fontFamily:"inherit",boxSizing:"border-box"});
      ta.rows=3; ta.placeholder=f.hint; ta.value=d.why;
      ta.addEventListener("focus",e=>e.target.style.borderBottomColor=f.accent);
      ta.addEventListener("blur",e=>e.target.style.borderBottomColor="#E4E4E7");
      ta.addEventListener("input",e=>{ const v=e.target.value.slice(0,MAX); if(e.target.value.length>MAX) e.target.value=v; state.fields[f.id].why=v; cs.textContent=`${v.length}/${MAX}`; });
      yw.appendChild(ta); cb2.appendChild(yw);
      card.appendChild(cb2); body.appendChild(card);
    });

    const submitBtn=el("button",{style:{width:"100%",padding:"15px",background:"#09090B",color:"#fff",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"15px",cursor:"pointer",transition:"all 0.2s",marginTop:"8px"},onClick:doSubmit},["제출하기"]);
    submitBtn.addEventListener("mouseenter",e=>e.target.style.background="#27272A");
    submitBtn.addEventListener("mouseleave",e=>e.target.style.background="#09090B");
    body.appendChild(submitBtn);
  }
  page.appendChild(body); return page;
}

async function doSubmit(){
  const s=state;
  const filled=FIELDS.filter(f=>s.fields[f.id]?.who||s.fields[f.id]?.why);
  if(filled.length===0){showAlert("최소 1개 분야를 작성해 주세요.");return;}
  const noWhy=FIELDS.filter(f=>s.fields[f.id]?.who&&!s.fields[f.id]?.why);
  if(noWhy.length>0){showAlert(`[${noWhy.map(f=>f.title).join(", ")}]\n추천 이유도 작성해 주세요.`);return;}
  const btn=document.querySelector("button[data-submit]");
  const ok=await saveSub(s.classId,{name:s.name,fields:s.fields});
  if(ok){ showToast("제출이 완료되었습니다"); setState({name:"",confirmed:false,fields:emptyF()}); }
  else showAlert("저장에 실패했습니다. 다시 시도해 주세요.");
}

// ── 관리자 ───────────────────────────────────────────────────
function renderAdmin(){
  const s=state; const cfg=CLASS_CONFIG[s.classId];
  const subs=s.adminSubs||[];
  const FC={study:"#6366F1",relation:"#0EA5E9",service:"#10B981",character:"#F59E0B"};
  const tally=Object.fromEntries(FIELDS.map(f=>[f.id,{}]));
  subs.forEach(sub=>FIELDS.forEach(f=>{ const n=sub.fields?.[f.id]?.who?.trim(); if(n) tally[f.id][n]=(tally[f.id][n]||0)+1; }));
  const totalT={};
  FIELDS.forEach(f=>Object.entries(tally[f.id]).forEach(([n,c])=>{ totalT[n]=(totalT[n]||0)+c; }));
  const ranking=Object.entries(totalT).sort((a,b)=>b[1]-a[1]);
  const maxV=Math.max(1,...Object.values(totalT));
  const notSub=cfg.students.filter(st=>!subs.find(sub=>sub.name===st));

  const page=el("div",{style:{minHeight:"100vh",background:"#FAFAFA"}});

  // 초기화 모달
  if(s.confirmReset){

    const box=el("div",{style:{background:"#fff",borderRadius:"20px",padding:"32px 28px",maxWidth:"320px",width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,0.15)"}});
    box.appendChild(el("p",{style:{fontSize:"16px",fontWeight:"800",color:"#09090B",marginBottom:"8px"}},["데이터를 초기화할까요?"]));
    box.appendChild(el("p",{style:{fontSize:"14px",color:"#71717A",lineHeight:"1.6",marginBottom:"28px"}},[`${cfg.label}의 전체 추천 데이터가 삭제됩니다. 되돌릴 수 없습니다.`]));
    const row=el("div",{style:{display:"flex",gap:"8px"}});
    row.appendChild(el("button",{style:{flex:"1",padding:"13px",background:"#F4F4F5",color:"#52525B",border:"none",borderRadius:"12px",fontWeight:"600",fontSize:"14px",cursor:"pointer"},onClick:()=>setState({confirmReset:false})},["취소"]));
    row.appendChild(el("button",{style:{flex:"1",padding:"13px",background:"#EF4444",color:"#fff",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"14px",cursor:"pointer"},onClick:async()=>{ await resetSubs(s.classId); setState({confirmReset:false,adminSubs:[]}); }},["초기화"]));
    box.appendChild(row); ov.appendChild(box); page.appendChild(ov);
  }

  // 헤더
  const hdr=el("div",{style:{position:"sticky",top:"0",zIndex:"20",background:"rgba(250,250,250,0.92)",backdropFilter:"blur(12px)",borderBottom:"1px solid #E4E4E7"}});
  const hdrIn=el("div",{style:{maxWidth:"480px",margin:"0 auto",padding:"0 20px"}});
  const hdrRow=el("div",{style:{display:"flex",alignItems:"center",height:"52px",gap:"12px"}});
  hdrRow.appendChild(el("button",{style:{background:"none",border:"none",cursor:"pointer",color:"#09090B",fontSize:"20px",padding:"4px"},onClick:()=>setState({screen:"home"})},["←"]));
  hdrRow.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"700",color:"#09090B"}},[`${cfg.label} 관리자`]));
  const dlBtn=el("button",{style:{marginLeft:"auto",fontSize:"12px",fontWeight:"700",color:"#fff",background:"#09090B",border:"none",borderRadius:"8px",padding:"6px 14px",cursor:"pointer"},onClick:()=>downloadXLSX(s.classId,subs)},["엑셀 다운로드"]);
  const rstBtn=el("button",{style:{fontSize:"12px",fontWeight:"600",color:"#EF4444",background:"transparent",border:"1.5px solid #FECACA",borderRadius:"8px",padding:"6px 12px",cursor:"pointer"},onClick:()=>setState({confirmReset:true})},["초기화"]);
  hdrRow.appendChild(dlBtn); hdrRow.appendChild(rstBtn); hdrIn.appendChild(hdrRow);
  const tabs=el("div",{style:{display:"flex",gap:"4px",paddingBottom:"12px"}});
  [["stats","통계"],["list","제출 목록"]].forEach(([k,l])=>{
    const t=el("button",{style:{padding:"6px 16px",borderRadius:"8px",fontSize:"13px",fontWeight:"600",border:"none",cursor:"pointer",background:s.adminTab===k?"#09090B":"transparent",color:s.adminTab===k?"#fff":"#A1A1AA",transition:"all 0.2s"},onClick:()=>setState({adminTab:k})},[l]);
    tabs.appendChild(t);
  });
  hdrIn.appendChild(tabs); hdr.appendChild(hdrIn); page.appendChild(hdr);

  const body=el("div",{style:{maxWidth:"480px",margin:"0 auto",padding:"24px 20px 60px"}});

  if(subs.length===0&&s.adminTab==="stats"){
    const loadMsg=el("div",{style:{textAlign:"center",padding:"48px 0",color:"#A1A1AA",fontSize:"14px"}},["데이터를 불러오는 중..."]);
    body.appendChild(loadMsg);
  }

  if(s.adminTab==="stats"){
    // 제출 현황
    const sc=el("div",{style:{background:"#fff",borderRadius:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.05)",overflow:"hidden",marginBottom:"12px"}});
    const sb=el("div",{style:{background:"linear-gradient(135deg,#09090B 0%,#3F3F46 100%)",padding:"20px"}});
    const st=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}});
    st.appendChild(el("p",{style:{fontSize:"11px",fontWeight:"700",color:"rgba(255,255,255,0.5)",letterSpacing:"0.1em",textTransform:"uppercase"}},["제출 현황"]));
    st.appendChild(el("span",{style:{fontSize:"28px",fontWeight:"800",color:"#fff",letterSpacing:"-0.03em",lineHeight:"1"}},[`${subs.length} / ${cfg.students.length}`]));
    sb.appendChild(st);
    const pb=el("div",{style:{marginTop:"12px",height:"4px",background:"rgba(255,255,255,0.2)",borderRadius:"999px"}});
    const pf=el("div",{style:{height:"100%",width:`${(subs.length/cfg.students.length)*100}%`,background:"#fff",borderRadius:"999px"}}); pb.appendChild(pf); sb.appendChild(pb); sc.appendChild(sb);
    if(notSub.length>0){ const nb=el("div",{style:{padding:"16px 20px"}}); nb.appendChild(el("p",{style:{fontSize:"11px",fontWeight:"700",color:"#A1A1AA",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"6px"}},[`미제출 ${notSub.length}명`])); nb.appendChild(el("p",{style:{fontSize:"13px",color:"#71717A",lineHeight:"1.7"}},[notSub.join(" · ")])); sc.appendChild(nb); }
    body.appendChild(sc);

    // 종합 순위
    const rc=el("div",{style:{background:"#fff",borderRadius:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.05)",padding:"20px",marginBottom:"12px"}});
    rc.appendChild(el("p",{style:{fontSize:"13px",fontWeight:"700",color:"#09090B",marginBottom:"4px"}},["종합 추천 순위"]));
    rc.appendChild(el("p",{style:{fontSize:"12px",color:"#A1A1AA",marginBottom:"20px"}},["전체 분야 합산 기준"]));
    if(ranking.length===0) rc.appendChild(el("p",{style:{fontSize:"13px",color:"#A1A1AA"}},["아직 데이터가 없습니다."]));
    ranking.forEach(([name,total],i)=>{
      const bd=FIELDS.map(f=>({f,cnt:tally[f.id][name]||0})).filter(x=>x.cnt>0);
      const row=el("div",{style:{display:"flex",alignItems:"center",gap:"12px",marginBottom:"16px"}});
      row.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"800",color:i===0?"#09090B":"#D4D4D8",width:"20px",textAlign:"right",flexShrink:"0"}},[`${i+1}`]));
      const right=el("div",{style:{flex:"1"}});
      const nr=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}});
      nr.appendChild(el("span",{style:{fontSize:"14px",fontWeight:"600",color:"#09090B"}},[name]));
      nr.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"700",color:"#09090B"}},[`${total}표`]));
      right.appendChild(nr);
      const bw=el("div",{style:{height:"4px",background:"#F4F4F5",borderRadius:"999px",overflow:"hidden",display:"flex",gap:"2px"}});
      bd.forEach(({f,cnt})=>{ const b=el("div",{style:{height:"100%",flex:`${cnt}`,background:`linear-gradient(90deg,${f.accent},${f.accent}CC)`,borderRadius:"999px",minWidth:"4px"}}); bw.appendChild(b); });
      right.appendChild(bw);
      const lb=el("div",{style:{display:"flex",gap:"10px",marginTop:"4px"}});
      bd.forEach(({f,cnt})=>lb.appendChild(el("span",{style:{fontSize:"10px",color:f.accent,fontWeight:"600"}},[`${f.title} ${cnt}`])));
      right.appendChild(lb); row.appendChild(right); rc.appendChild(row);
    });
    body.appendChild(rc);

    // 분야별
    FIELDS.forEach(f=>{
      const entries=Object.entries(tally[f.id]).sort((a,b)=>b[1]-a[1]);
      const mx=entries[0]?.[1]||1;
      const card=el("div",{style:{background:"#fff",borderRadius:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.05)",overflow:"hidden",marginBottom:"12px"}});
      const ch=el("div",{style:{background:`linear-gradient(135deg,${f.accent}22,${f.accent}0A)`,borderBottom:`2px solid ${f.accent}33`,padding:"14px 20px",display:"flex",alignItems:"center",gap:"10px"}});
      ch.appendChild(el("div",{style:{width:"4px",height:"18px",background:`linear-gradient(to bottom,${f.accent},${f.accent}88)`,borderRadius:"2px"}}));
      ch.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"700",color:"#09090B"}},[`${f.num} ${f.title}`]));
      card.appendChild(ch);
      const cb=el("div",{style:{padding:"16px 20px"}});
      if(entries.length===0) cb.appendChild(el("p",{style:{fontSize:"13px",color:"#A1A1AA"}},["추천 없음"]));
      entries.forEach(([name,cnt])=>{
        const row=el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}});
        row.appendChild(el("span",{style:{fontSize:"13px",color:"#3F3F46",width:"56px",textAlign:"right",flexShrink:"0",fontWeight:"500"}},[name]));
        const bw=el("div",{style:{flex:"1",height:"6px",background:"#F4F4F5",borderRadius:"999px",overflow:"hidden"}});
        bw.appendChild(el("div",{style:{height:"100%",width:`${(cnt/mx)*100}%`,background:`linear-gradient(90deg,${f.accent},${f.accent}AA)`,borderRadius:"999px"}}));
        row.appendChild(bw);
        row.appendChild(el("span",{style:{fontSize:"12px",fontWeight:"700",color:"#09090B",width:"16px",flexShrink:"0"}},[`${cnt}`]));
        cb.appendChild(row);
      });
      card.appendChild(cb); body.appendChild(card);
    });
  }

  if(s.adminTab==="list"){
    if(subs.length===0) body.appendChild(el("p",{style:{color:"#A1A1AA",fontSize:"14px",textAlign:"center",padding:"48px 0"}},["제출된 추천서가 없습니다."]));
    subs.forEach((sub,i)=>{
      const card=el("div",{style:{background:"#fff",borderRadius:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.05)",marginBottom:"8px",overflow:"hidden"}});
      const hd=el("button",{style:{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 20px",background:"none",border:"none",cursor:"pointer"},onClick:()=>setState({adminSel:s.adminSel===i?null:i})});
      const left=el("div");
      left.appendChild(el("p",{style:{fontSize:"15px",fontWeight:"600",color:"#09090B",marginBottom:"2px"}},[sub.name]));
      left.appendChild(el("p",{style:{fontSize:"12px",color:"#A1A1AA"}},[sub.at]));
      hd.appendChild(left);
      hd.appendChild(el("span",{style:{color:"#A1A1AA",fontSize:"12px",transform:s.adminSel===i?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s",display:"block"}},["▼"]));
      card.appendChild(hd);
      if(s.adminSel===i){
        const detail=el("div",{style:{borderTop:"1px solid #F4F4F5",padding:"16px 20px",display:"flex",flexDirection:"column",gap:"16px"}});
        FIELDS.forEach(f=>{ const d=sub.fields?.[f.id]; if(!d?.who&&!d?.why) return; const dv=el("div",{style:{paddingLeft:"12px",borderLeft:`3px solid ${f.accent}`}}); dv.appendChild(el("p",{style:{fontSize:"11px",fontWeight:"700",color:f.accent,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:"4px"}},[f.title])); dv.appendChild(el("p",{style:{fontSize:"14px",color:"#09090B",fontWeight:"600",marginBottom:"4px"}},[d.who||"—"])); dv.appendChild(el("p",{style:{fontSize:"13px",color:"#71717A",lineHeight:"1.5"}},[d.why||"—"])); detail.appendChild(dv); });
        card.appendChild(detail);
      }
      body.appendChild(card);
    });
  }

  page.appendChild(body); return page;
}

render();

function loadSubs(cid){ try{ const r=localStorage.getItem(STORAGE_KEY+cid); return r?JSON.parse(r):[]; }catch{ return []; } }
function saveSub(cid,data){ try{ const ex=loadSubs(cid); ex.push({...data,at:new Date().toLocaleString("ko-KR")}); localStorage.setItem(STORAGE_KEY+cid,JSON.stringify(ex)); return true; }catch{ return false; } }
function resetSubs(cid){ localStorage.removeItem(STORAGE_KEY+cid); }

// ── 엑셀 ───────────────────────────────────────────────────────
function downloadXLSX(cid){
  const cfg=CLASS_CONFIG[cid]; const subs=loadSubs(cid);
  const wb=XLSX.utils.book_new();
  const byName=[["작성자","제출시간","분야","추천 친구","추천 이유"]];
  subs.forEach(s=>FIELDS.forEach(f=>{ const d=s.fields[f.id]; if(d&&(d.who||d.why)) byName.push([s.name,s.at,f.title,d.who||"",d.why||""]); }));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(byName),"이름별");
  FIELDS.forEach(f=>{ const rows=[["추천받은 친구","추천한 학생","추천 이유"]]; subs.forEach(s=>{ const d=s.fields[f.id]; if(d&&(d.who||d.why)) rows.push([d.who||"",s.name,d.why||""]); }); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),f.title); });
  const tally=Object.fromEntries(FIELDS.map(f=>[f.id,{}]));
  subs.forEach(s=>FIELDS.forEach(f=>{ const n=s.fields[f.id]?.who?.trim(); if(n) tally[f.id][n]=(tally[f.id][n]||0)+1; }));
  const total={};
  FIELDS.forEach(f=>Object.entries(tally[f.id]).forEach(([n,c])=>{ total[n]=(total[n]||0)+c; }));
  const stat=[["순위","이름","총합",...FIELDS.map(f=>f.title)]];
  Object.entries(total).sort((a,b)=>b[1]-a[1]).forEach(([n,t],i)=>stat.push([i+1,n,t,...FIELDS.map(f=>tally[f.id][n]||0)]));
  stat.push([]); stat.push(["제출현황",`${subs.length}명 / ${cfg.students.length}명`]);
  const notSub=cfg.students.filter(s=>!subs.find(sub=>sub.name===s));
  if(notSub.length) stat.push(["미제출",notSub.join(", ")]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(stat),"통계");
  XLSX.writeFile(wb,`${cfg.label}_성장상.xlsx`);
}

  (children||[]).forEach(c=>{ if(c===null||c===undefined) return; e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
}

      card.appendChild(cardHdr);

      const cardBody=el("div",{style:{padding:"18px 20px 20px",display:"flex",flexDirection:"column",gap:"16px"}});

      // 친구 선택 — render() 없이 state만 수정
      const whoWrap=el("div");
      whoWrap.appendChild(el("label",{style:{display:"block",fontSize:"11px",fontWeight:"700",color:"#A1A1AA",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"8px"}},["추천 친구"]));
      const whoSel=document.createElement("select");
      Object.assign(whoSel.style,{width:"100%",border:"none",borderBottom:`2px solid #E4E4E7`,background:"transparent",padding:"8px 0",fontSize:"16px",color:d.who?"#09090B":"#A1A1AA",outline:"none",appearance:"none",transition:"border-color 0.2s",cursor:"pointer",boxSizing:"border-box"});
      whoSel.addEventListener("focus",e=>e.target.style.borderBottomColor=f.accent);
      whoSel.addEventListener("blur",e=>e.target.style.borderBottomColor="#E4E4E7");
      whoSel.addEventListener("change",e=>{ state.fields[f.id].who=e.target.value; });
      const defOpt=document.createElement("option"); defOpt.value=""; defOpt.textContent="선택 안 함"; whoSel.appendChild(defOpt);
      nominees.forEach(n=>{ const o=document.createElement("option"); o.value=n; o.textContent=n; if(n===d.who) o.selected=true; whoSel.appendChild(o); });
      whoWrap.appendChild(whoSel); cardBody.appendChild(whoWrap);

      // 이유 — render() 없이 state만 수정
      const whyWrap=el("div");
      const whyTop=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
      whyTop.appendChild(el("label",{style:{fontSize:"11px",fontWeight:"700",color:"#A1A1AA",letterSpacing:"0.08em",textTransform:"uppercase"}},["내가 이 친구를 추천하는 이유"]));
      const cntSpan=el("span",{style:{fontSize:"10px",color:"#A1A1AA"}},[d.why.length>0?`${d.why.length}/${MAX}`:""]);
      whyTop.appendChild(cntSpan); whyWrap.appendChild(whyTop);
      const ta=document.createElement("textarea");
      Object.assign(ta.style,{width:"100%",border:"none",borderBottom:`2px solid #E4E4E7`,background:"transparent",padding:"8px 0",fontSize:"14px",color:"#09090B",outline:"none",resize:"none",lineHeight:"1.6",transition:"border-color 0.2s",fontFamily:"inherit",boxSizing:"border-box"});
      ta.rows=3; ta.placeholder=f.hint; ta.value=d.why;
      ta.addEventListener("focus",e=>e.target.style.borderBottomColor=f.accent);
      ta.addEventListener("blur",e=>e.target.style.borderBottomColor="#E4E4E7");
      ta.addEventListener("input",e=>{
        const v=e.target.value.slice(0,MAX);
        if(e.target.value.length>MAX) e.target.value=v;
        state.fields[f.id].why=v;
        cntSpan.textContent=`${v.length}/${MAX}`;
      });
      whyWrap.appendChild(ta); cardBody.appendChild(whyWrap);
      card.appendChild(cardBody); body.appendChild(card);
    });

    // 제출 버튼
    const btnWrap=el("div",{style:{display:"flex",flexDirection:"column",gap:"10px",marginTop:"8px"}});
    const submitBtn=el("button",{style:{width:"100%",padding:"15px",background:"#09090B",color:"#fff",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"15px",cursor:"pointer",transition:"all 0.2s"},onMouseenter:e=>e.target.style.background="#27272A",onMouseleave:e=>e.target.style.background="#09090B",onClick:doSubmit},["제출하기"]);
    btnWrap.appendChild(submitBtn); body.appendChild(btnWrap);
  }
  page.appendChild(body); return page;
}

function doSubmit(){
  const s=state;
  const filled=FIELDS.filter(f=>s.fields[f.id]?.who||s.fields[f.id]?.why);
  if(filled.length===0){showAlert("최소 1개 분야를 작성해 주세요.");return;}
  const noWhy=FIELDS.filter(f=>s.fields[f.id]?.who&&!s.fields[f.id]?.why);
  if(noWhy.length>0){showAlert(`[${noWhy.map(f=>f.title).join(", ")}]\n추천 이유도 작성해 주세요.`);return;}
  const ok=saveSub(s.classId,{name:s.name,fields:s.fields});
  if(ok){ showToast("제출이 완료되었습니다"); setState({name:"",confirmed:false,fields:emptyF()}); }
  else showAlert("저장에 실패했습니다. 다시 시도해 주세요.");
}

function showAlert(msg){
  const overlay=el("div",{style:{position:"fixed",inset:"0",zIndex:"999",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",background:"rgba(0,0,0,0.3)",backdropFilter:"blur(4px)"}});
  const box=el("div",{style:{background:"#fff",borderRadius:"20px",padding:"32px 28px",maxWidth:"320px",width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,0.15)"}});
  const p=el("p",{style:{fontSize:"15px",color:"#3F3F46",lineHeight:"1.6",marginBottom:"24px",whiteSpace:"pre-line"}},[msg]);
  const btn=el("button",{style:{width:"100%",padding:"14px",background:"#09090B",color:"#fff",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"15px",cursor:"pointer"},onClick:()=>overlay.remove()},["확인"]);
  box.appendChild(p); box.appendChild(btn); overlay.appendChild(box); document.body.appendChild(overlay);
}

// ── 관리자 ────────────────────────────────────────────────────
function renderAdmin(){
  const s=state; const cfg=CLASS_CONFIG[s.classId];
  const subs=loadSubs(s.classId);
  const tally=Object.fromEntries(FIELDS.map(f=>[f.id,{}]));
  subs.forEach(sub=>FIELDS.forEach(f=>{ const n=sub.fields[f.id]?.who?.trim(); if(n) tally[f.id][n]=(tally[f.id][n]||0)+1; }));
  const totalT={};
  FIELDS.forEach(f=>Object.entries(tally[f.id]).forEach(([n,c])=>{ totalT[n]=(totalT[n]||0)+c; }));
  const ranking=Object.entries(totalT).sort((a,b)=>b[1]-a[1]);
  const maxV=Math.max(1,...Object.values(totalT));
  const notSub=cfg.students.filter(st=>!subs.find(sub=>sub.name===st));
  const FC={study:"#6366F1",relation:"#0EA5E9",service:"#10B981",character:"#F59E0B"};

  const page=el("div",{style:{minHeight:"100vh",background:"#FAFAFA"}});

  // 초기화 확인 모달
  if(s.confirmReset){
    const ov=el("div",{style:{position:"fixed",inset:"0",zIndex:"50",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",background:"rgba(0,0,0,0.3)",backdropFilter:"blur(4px)"}});
    const box=el("div",{style:{background:"#fff",borderRadius:"20px",padding:"32px 28px",maxWidth:"320px",width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,0.15)"}});
    box.appendChild(el("p",{style:{fontSize:"16px",fontWeight:"800",color:"#09090B",marginBottom:"8px",letterSpacing:"-0.02em"}},["데이터를 초기화할까요?"]));
    box.appendChild(el("p",{style:{fontSize:"14px",color:"#71717A",lineHeight:"1.6",marginBottom:"28px"}},[`${cfg.label}의 전체 추천 데이터가 삭제됩니다. 이 작업은 되돌릴 수 없습니다.`]));
    const row=el("div",{style:{display:"flex",gap:"8px"}});
    row.appendChild(el("button",{style:{flex:"1",padding:"13px",background:"#F4F4F5",color:"#52525B",border:"none",borderRadius:"12px",fontWeight:"600",fontSize:"14px",cursor:"pointer"},onClick:()=>setState({confirmReset:false})},["취소"]));
    row.appendChild(el("button",{style:{flex:"1",padding:"13px",background:"#EF4444",color:"#fff",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"14px",cursor:"pointer"},onClick:()=>{ resetSubs(s.classId); setState({confirmReset:false}); }},["초기화"]));
    box.appendChild(row); ov.appendChild(box); page.appendChild(ov);
  }

  // 헤더
  const hdr=el("div",{style:{position:"sticky",top:"0",zIndex:"20",background:"rgba(250,250,250,0.92)",backdropFilter:"blur(12px)",borderBottom:"1px solid #E4E4E7"}});
  const hdrIn=el("div",{style:{maxWidth:"480px",margin:"0 auto",padding:"0 20px"}});
  const hdrRow=el("div",{style:{display:"flex",alignItems:"center",height:"52px",gap:"12px"}});
  hdrRow.appendChild(el("button",{style:{background:"none",border:"none",cursor:"pointer",color:"#09090B",fontSize:"20px",padding:"4px"},onClick:()=>setState({screen:"home"})},["←"]));
  hdrRow.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"700",color:"#09090B"}},[`${cfg.label} 관리자`]));
  const dlBtn=el("button",{style:{marginLeft:"auto",fontSize:"12px",fontWeight:"700",color:"#fff",background:"#09090B",border:"none",borderRadius:"8px",padding:"6px 14px",cursor:"pointer"},onClick:()=>downloadXLSX(s.classId)},["엑셀 다운로드"]);
  const rstBtn=el("button",{style:{fontSize:"12px",fontWeight:"600",color:"#EF4444",background:"transparent",border:"1.5px solid #FECACA",borderRadius:"8px",padding:"6px 12px",cursor:"pointer"},onClick:()=>setState({confirmReset:true})},["초기화"]);
  hdrRow.appendChild(dlBtn); hdrRow.appendChild(rstBtn); hdrIn.appendChild(hdrRow);
  const tabs=el("div",{style:{display:"flex",gap:"4px",paddingBottom:"12px"}});
  [["stats","통계"],["list","제출 목록"]].forEach(([k,l])=>{
    const t=el("button",{style:{padding:"6px 16px",borderRadius:"8px",fontSize:"13px",fontWeight:"600",border:"none",cursor:"pointer",background:s.adminTab===k?"#09090B":"transparent",color:s.adminTab===k?"#fff":"#A1A1AA",transition:"all 0.2s"},onClick:()=>setState({adminTab:k})},[l]);
    tabs.appendChild(t);
  });
  hdrIn.appendChild(tabs); hdr.appendChild(hdrIn); page.appendChild(hdr);

  const body=el("div",{style:{maxWidth:"480px",margin:"0 auto",padding:"24px 20px 60px"}});

  if(s.adminTab==="stats"){
    // 제출 현황
    const statCard=el("div",{style:{background:"#fff",borderRadius:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.05)",overflow:"hidden",marginBottom:"12px"}});
    const statBanner=el("div",{style:{background:"linear-gradient(135deg,#09090B 0%,#3F3F46 100%)",padding:"20px"}});
    const statTop=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}});
    statTop.appendChild(el("p",{style:{fontSize:"11px",fontWeight:"700",color:"rgba(255,255,255,0.5)",letterSpacing:"0.1em",textTransform:"uppercase"}},["제출 현황"]));
    statTop.appendChild(el("span",{style:{fontSize:"28px",fontWeight:"800",color:"#fff",letterSpacing:"-0.03em",lineHeight:"1"}},[ `${subs.length}` + ` / ${cfg.students.length}` ]));
    statBanner.appendChild(statTop);
    const bar=el("div",{style:{marginTop:"12px",height:"4px",background:"rgba(255,255,255,0.2)",borderRadius:"999px"}});
    const fill=el("div",{style:{height:"100%",width:`${(subs.length/cfg.students.length)*100}%`,background:"#fff",borderRadius:"999px"}});
    bar.appendChild(fill); statBanner.appendChild(bar); statCard.appendChild(statBanner);
    if(notSub.length>0){
      const nb=el("div",{style:{padding:"16px 20px"}});
      nb.appendChild(el("p",{style:{fontSize:"11px",fontWeight:"700",color:"#A1A1AA",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"6px"}},[`미제출 ${notSub.length}명`]));
      nb.appendChild(el("p",{style:{fontSize:"13px",color:"#71717A",lineHeight:"1.7"}},[notSub.join(" · ")]));
      statCard.appendChild(nb);
    }
    body.appendChild(statCard);

    // 종합 순위
    const rankCard=el("div",{style:{background:"#fff",borderRadius:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.05)",padding:"20px",marginBottom:"12px"}});
    rankCard.appendChild(el("p",{style:{fontSize:"13px",fontWeight:"700",color:"#09090B",marginBottom:"4px"}},["종합 추천 순위"]));
    rankCard.appendChild(el("p",{style:{fontSize:"12px",color:"#A1A1AA",marginBottom:"20px"}},["전체 분야 합산 기준"]));
    if(ranking.length===0) rankCard.appendChild(el("p",{style:{fontSize:"13px",color:"#A1A1AA"}},["데이터 없음"]));
    ranking.forEach(([name,total],i)=>{
      const breakdown=FIELDS.map(f=>({f,cnt:tally[f.id][name]||0})).filter(x=>x.cnt>0);
      const row=el("div",{style:{display:"flex",alignItems:"center",gap:"12px",marginBottom:"16px"}});
      row.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"800",color:i===0?"#09090B":"#D4D4D8",width:"20px",textAlign:"right",flexShrink:"0"}},[`${i+1}`]));
      const right=el("div",{style:{flex:"1"}});
      const nameRow=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}});
      nameRow.appendChild(el("span",{style:{fontSize:"14px",fontWeight:"600",color:"#09090B"}},[name]));
      nameRow.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"700",color:"#09090B"}},[`${total}표`]));
      right.appendChild(nameRow);
      const barWrap=el("div",{style:{height:"4px",background:"#F4F4F5",borderRadius:"999px",overflow:"hidden",display:"flex",gap:"2px"}});
      breakdown.forEach(({f,cnt})=>{ const b=el("div",{style:{height:"100%",flex:`${cnt}`,background:`linear-gradient(90deg,${f.accent},${f.accent}CC)`,borderRadius:"999px",minWidth:"4px"}}); barWrap.appendChild(b); });
      right.appendChild(barWrap);
      const labels=el("div",{style:{display:"flex",gap:"10px",marginTop:"4px"}});
      breakdown.forEach(({f,cnt})=>labels.appendChild(el("span",{style:{fontSize:"10px",color:f.accent,fontWeight:"600"}},[`${f.title} ${cnt}`])));
      right.appendChild(labels); row.appendChild(right); rankCard.appendChild(row);
    });
    body.appendChild(rankCard);

    // 분야별
    FIELDS.forEach(f=>{
      const entries=Object.entries(tally[f.id]).sort((a,b)=>b[1]-a[1]);
      const mx=entries[0]?.[1]||1;
      const card=el("div",{style:{background:"#fff",borderRadius:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.05)",overflow:"hidden",marginBottom:"12px"}});
      const ch=el("div",{style:{background:`linear-gradient(135deg,${f.accent}22,${f.accent}0A)`,borderBottom:`2px solid ${f.accent}33`,padding:"14px 20px",display:"flex",alignItems:"center",gap:"10px"}});
      const accent=el("div",{style:{width:"4px",height:"18px",background:`linear-gradient(to bottom,${f.accent},${f.accent}88)`,borderRadius:"2px"}});
      ch.appendChild(accent); ch.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"700",color:"#09090B"}},[`${f.num} ${f.title}`])); card.appendChild(ch);
      const cb=el("div",{style:{padding:"16px 20px"}});
      if(entries.length===0) cb.appendChild(el("p",{style:{fontSize:"13px",color:"#A1A1AA"}},["추천 없음"]));
      entries.forEach(([name,cnt])=>{
        const row=el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}});
        row.appendChild(el("span",{style:{fontSize:"13px",color:"#3F3F46",width:"56px",textAlign:"right",flexShrink:"0",fontWeight:"500"}},[name]));
        const bw=el("div",{style:{flex:"1",height:"6px",background:"#F4F4F5",borderRadius:"999px",overflow:"hidden"}});
        const bf=el("div",{style:{height:"100%",width:`${(cnt/mx)*100}%`,background:`linear-gradient(90deg,${f.accent},${f.accent}AA)`,borderRadius:"999px"}});
        bw.appendChild(bf); row.appendChild(bw);
        row.appendChild(el("span",{style:{fontSize:"12px",fontWeight:"700",color:"#09090B",width:"16px",flexShrink:"0"}},[`${cnt}`]));
        cb.appendChild(row);
      });
      card.appendChild(cb); body.appendChild(card);
    });
  }

  if(s.adminTab==="list"){
    if(subs.length===0) body.appendChild(el("p",{style:{color:"#A1A1AA",fontSize:"14px",textAlign:"center",padding:"48px 0"}},["제출된 추천서가 없습니다."]));
    subs.forEach((sub,i)=>{
      const card=el("div",{style:{background:"#fff",borderRadius:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.05)",marginBottom:"8px",overflow:"hidden"}});
      const hd=el("button",{style:{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 20px",background:"none",border:"none",cursor:"pointer"},onClick:()=>setState({adminSel:s.adminSel===i?null:i})});
      const left=el("div");
      left.appendChild(el("p",{style:{fontSize:"15px",fontWeight:"600",color:"#09090B",marginBottom:"2px"}},[sub.name]));
      left.appendChild(el("p",{style:{fontSize:"12px",color:"#A1A1AA"}},[sub.at]));
      hd.appendChild(left);
      const arr=el("span",{style:{color:"#A1A1AA",fontSize:"12px",display:"block",transform:s.adminSel===i?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}},["▼"]);
      hd.appendChild(arr); card.appendChild(hd);
      if(s.adminSel===i){
        const detail=el("div",{style:{borderTop:"1px solid #F4F4F5",padding:"16px 20px",display:"flex",flexDirection:"column",gap:"16px"}});
        FIELDS.forEach(f=>{ const d=sub.fields[f.id]; if(!d?.who&&!d?.why) return; const dv=el("div",{style:{paddingLeft:"12px",borderLeft:`3px solid ${f.accent}`}}); dv.appendChild(el("p",{style:{fontSize:"11px",fontWeight:"700",color:f.accent,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:"4px"}},[f.title])); dv.appendChild(el("p",{style:{fontSize:"14px",color:"#09090B",fontWeight:"600",marginBottom:"4px"}},[d.who||"—"])); dv.appendChild(el("p",{style:{fontSize:"13px",color:"#71717A",lineHeight:"1.5"}},[d.why||"—"])); detail.appendChild(dv); });
        card.appendChild(detail);
      }
      body.appendChild(card);
    });
  }

  page.appendChild(body); return page;
}

render();
</script>
</body>
